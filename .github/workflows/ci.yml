name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check
        run: python -m py_compile src/codex_monitor_app.py
      - name: CLI help
        run: python src/codex_monitor_app.py --help
